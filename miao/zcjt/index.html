<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>私密1V1 · 专属互动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0b0710;
            background: radial-gradient(ellipse at 30% 40%, #2a1b3c 0%, #0a0815 90%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: white;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 70% 70%, rgba(255, 40, 120, 0.25) 0%, transparent 45%),
                        radial-gradient(circle at 20% 30%, rgba(157, 80, 255, 0.3) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .download-card {
            position: relative;
            z-index: 5;
            max-width: 420px;
            width: 100%;
            background: rgba(18, 14, 28, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 48px;
            border: 1px solid rgba(255, 70, 150, 0.4);
            box-shadow: 0 30px 60px -10px black, 0 0 0 1px rgba(255, 120, 200, 0.2) inset, 0 0 40px rgba(200, 70, 255, 0.4);
            padding: 24px 18px 32px;
            overflow: hidden;
        }

        .live-badge {
            display: flex;
            justify-content: center;
            gap: 0.3rem;
            margin-bottom: 0.5rem;
        }

        .live-badge span {
            background: #ff1168;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 0 15px #ff1168;
            border: 1px solid #ffb0ca;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(145deg, #fff 0%, #ffb6d1 70%, #f49ac0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.1rem;
            text-shadow: 0 0 20px #ff4d8c;
            line-height: 1.2;
        }

        .hot-tag {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            color: #ffcfcf;
            background: rgba(255, 30, 110, 0.25);
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            width: fit-content;
            margin: 0.2rem auto 1.2rem auto;
            border: 1px solid #ff5f9e;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 12px #f24;
        }

        .girl-live-section {
            margin-bottom: 1.8rem;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            background: #1a1225;
            border: 2px solid rgba(255, 20, 100, 0.7);
            box-shadow: 0 15px 25px -8px black, 0 0 30px #ff3b6f;
            cursor: pointer;
            transition: transform 0.2s ease;
            /* 添加加载动画背景 */
            background-image: linear-gradient(45deg, #2a1a2a 25%, #3a2a3a 50%, #2a1a2a 75%);
            background-size: 200% 200%;
            animation: loadingShimmer 1.5s infinite;
        }

        @keyframes loadingShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .girl-live-section.loaded {
            background-image: none;
            animation: none;
        }

        .girl-live-section:active {
            transform: scale(0.99);
        }

        /* 媒体容器 */
        .media-container {
            width: 100%;
            aspect-ratio: 1 / 1.3;
            position: relative;
            background-color: transparent;
            overflow: hidden;
            pointer-events: none;
        }
        
        /* 图片样式 - 优化加载 */
        .media-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            /* 添加淡入效果 */
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        
        .media-container img.loaded {
            opacity: 1;
        }

        /* 所有覆盖在直播区域上的标签都不拦截点击 */
        .live-flag,
        .live-status,
        .girl-info {
            pointer-events: none;
            z-index: 30;
        }

        /* 直播角标 - 左上 */
        .live-flag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #ff0844;
            color: white;
            font-weight: 800;
            font-size: 1.3rem;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            border: 2px solid white;
            box-shadow: 0 0 20px #ff0055, 0 4px 8px black;
            display: flex;
            align-items: center;
            gap: 4px;
            backdrop-filter: blur(4px);
            text-transform: uppercase;
        }

        .live-flag span {
            font-size: 1.7rem;
        }

        /* 右上角 正在直播中 + 跳动效果 */
        .live-status {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid #ff4d7d;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 0 15px #ff3b6f;
            animation: beat 1.2s ease-in-out infinite;
        }

        @keyframes beat {
            0% { transform: scale(1); box-shadow: 0 0 15px #ff3b6f; }
            25% { transform: scale(1.08); box-shadow: 0 0 25px #ff1168; }
            50% { transform: scale(1); box-shadow: 0 0 15px #ff3b6f; }
            75% { transform: scale(1.05); box-shadow: 0 0 20px #ff6b9d; }
            100% { transform: scale(1); box-shadow: 0 0 15px #ff3b6f; }
        }

        .live-status span {
            font-size: 1rem;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #ff0844;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff0844;
            margin-right: 2px;
            animation: dotPulse 1.2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0% { opacity: 1; transform: scale(1); background: #ff0844; }
            50% { opacity: 0.7; transform: scale(1.3); background: #ff5e9e; }
            100% { opacity: 1; transform: scale(1); background: #ff0844; }
        }

        /* 女主播信息 - 中间靠下位置 */
        .girl-info {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 20%;
            background: rgba(25, 10, 30, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: 1px solid #f7b;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(255, 100, 200, 0.5);
        }

        .girl-info .dot {
            width: 8px;
            height: 8px;
            background: #00ff6a;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ff88;
        }

        /* 邀请提示区域 - 修改为“找主播邀请你进专属房间” */
        .invite-notice {
            background: rgba(255, 105, 180, 0.2);
            border: 1px solid #ff69b4;
            border-radius: 30px;
            padding: 0.7rem 1rem;
            margin: 0.5rem 0 0.8rem;
            text-align: center;
            font-size: 1rem;
            color: #ffb6c1;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.3);
        }
        
        .invite-notice span {
            font-size: 1.3rem;
        }

        .invite-notice strong {
            color: #ffffff;
            font-weight: 700;
            text-shadow: 0 0 8px #ff69b4;
        }

        /* 下载按钮 */
        .download-btn-single {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 100%;
            padding: 1rem 1rem;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 700;
            border: none;
            color: white;
            background: linear-gradient(145deg, #ff3b6f, #b02b8a);
            box-shadow: 0 15px 25px -8px #ad1c6b, 0 0 0 2px rgba(255, 255, 255, 0.3) inset, 0 0 30px #ff3b6f;
            transition: all 0.12s;
            cursor: pointer;
            touch-action: manipulation;
            text-decoration: none;
            margin: 1.2rem 0 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
        }

        .download-btn-single span {
            font-size: 1.9rem;
        }

        .download-btn-single:active {
            transform: translateY(3px);
            box-shadow: 0 8px 15px -4px #8f1455, 0 0 0 2px rgba(255, 255, 255, 0.3) inset;
        }

        .bonus-text {
            text-align: center;
            font-size: 1.1rem;
            color: #ffd966;
            margin: 0.5rem 0 0.2rem;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .bonus-text strong {
            color: #ffffff;
            font-size: 1.3rem;
            background: linear-gradient(145deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #ffaa00;
        }

        .footer-link {
            text-align: center;
            font-size: 0.95rem;
            color: #b999cc;
            margin-top: 1rem;
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff4d7d, #b45eff, transparent);
            margin: 1rem 0 0.5rem;
        }

        .auto-detect-hint {
            text-align: center;
            font-size: 0.8rem;
            color: #ffb0c3;
            margin-top: -0.2rem;
            margin-bottom: 0.3rem;
            opacity: 0.9;
        }

        /* ========== 私信主播按钮 ========== */
        .private-message-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 9998;
            background: linear-gradient(145deg, #ff3b6f, #b02b8a);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            padding: 12px 24px;
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(255, 59, 111, 0.5), 0 0 20px #ff3b6f;
            cursor: pointer;
            transition: all 0.2s ease;
            animation: messageFloat 2s ease-in-out infinite;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .private-message-btn span {
            font-size: 1.8rem;
        }

        .private-message-btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(255, 59, 111, 0.7);
        }

        @keyframes messageFloat {
            0% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0); }
        }

        /* ========== 虚浮客服层 ========== */
        .floating-chat {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 90vw;
            max-width: 450px;
            height: 70vh;
            max-height: 700px;
            background: rgba(25, 15, 35, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 2px solid #ff4d7d;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 30px #ff3b6f;
            z-index: 9999;
            overflow: hidden;
            transition: all 0.3s ease;
            transform-origin: bottom right;
            display: flex;
            flex-direction: column;
        }

        .floating-chat.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8);
            pointer-events: none;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(90deg, #ff3b6f, #b02b8a);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .chat-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header h3 span {
            font-size: 1.4rem;
        }

        .close-chat {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-chat:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.9);
        }

        .chat-content {
            flex: 1;
            width: 100%;
            background: white;
            overflow: hidden;
            min-height: 0;
        }

        .chat-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        @media (max-width: 480px) {
            .private-message-btn {
                bottom: 20px;
                right: 10px;
                padding: 10px 18px;
                font-size: 1.2rem;
            }
            
            .floating-chat {
                bottom: 80px;
                right: 10px;
                width: 95vw;
                height: 75vh;
            }
            
            .chat-header {
                padding: 14px 16px;
            }
            
            .chat-header h3 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

        <h1>私密1V1互动</h1>
        <div class="hot-tag">

        <!-- 媒体区域：使用同目录下的 sp.png -->

                <!-- 静态图片 - 添加加载优化属性 -->
                <img

                />
                
                <!-- 直播角标 左上 -->

                </div>
                
                <!-- 右上角 正在直播中 + 跳动效果 -->
                <div class="live-status">

                    <span></span> 正在直播...

                <!-- 女主播信息 中间靠下 -->

        <!-- 邀请提醒 - 修改为“找主播邀请你进专属房间” -->
        <div class="invite-notice">
            <span>🔑</span> 下载后 · 注册ID <strong>右下角私信主播</strong> <span>🔑</span>
        </div>
        <div class="invite-notice" style="margin-top: -0.3rem; background: rgba(255, 105, 180, 0.1);">
            <span>💝</span> 免费邀请 · 进房即可私密互动 <span>💝</span>
        </div>

        <!-- 下载按钮 -->
        <button class="download-btn-single" id="downloadBtn">

        </button>
        <div class="auto-detect-hint">
            ⚡ 自动识别您的手机类型，跳转对应商店 ⚡
        </div>

        <!-- 仅限18岁以上海外华人激活进入 -->
        <div class="bonus-text">
            <strong>🌐 仅限18岁以上</strong> · 海外华人激活 <span>🌐</span>
        </div>

        <hr>

        <div class="footer-link">
            ⚡ 已有 2800+ 男生加入 · 立刻私密互动 ⚡
        </div>
    </div>

    <!-- 私信主播按钮 -->
    <div class="private-message-btn" id="privateMessageBtn">
        <span>💬</span> 私信主播
    </div>

    <!-- 虚浮客服层 (初始隐藏，且iframe不会自动加载) -->
    <div class="floating-chat hidden" id="floatingChat">
        <div class="chat-header">
            <h3>
                <span>💬</span>发你的ID主播免费邀请进入
            </h3>
            <div class="close-chat" id="closeChatBtn">✕</div>
        </div>
        <div class="chat-content" id="chatContent">
            <!-- 初始时iframe不存在，防止自动加载 -->
        </div>
    </div>

    <script>
        (function() {
            const downloadBtn = document.getElementById('downloadBtn');
            const liveArea = document.getElementById('liveArea');
            const mainImage = document.getElementById('mainImage');
            
            // 私信相关元素
            const privateMsgBtn = document.getElementById('privateMessageBtn');
            const floatingChat = document.getElementById('floatingChat');
            const closeChatBtn = document.getElementById('closeChatBtn');
            const chatContent = document.getElementById('chatContent');

            // 标志iframe是否已经加载过 (避免重复创建)
            let iframeLoaded = false;
            const IFRAME_SRC = "https://vm.thasmoll.com/10fyhlfng456j08lx9fyamjx53";

            // 图片加载完成后的处理
            if (mainImage) {
                // 如果图片已经加载完成
                if (mainImage.complete) {
                    mainImage.classList.add('loaded');
                    liveArea.classList.add('loaded');
                } else {
                    // 等待图片加载完成
                    mainImage.addEventListener('load', function() {
                        mainImage.classList.add('loaded');
                        liveArea.classList.add('loaded');
                    });
                    
                    // 加载失败也移除动画（避免一直闪烁）
                    mainImage.addEventListener('error', function() {
                        liveArea.classList.add('loaded');
                    });
                }
            }

            // 定义下载链接
            const APP_STORE_URL = 'https://aq.lumawang.com/yokaapp';
            const PLAY_STORE_URL = 'https://play.google.com/store/search?q=yoka%20live';
            const FALLBACK_URL = 'https://vm.thasmoll.com/10fyhlfng456j08lx9fyamjx53';

            function getMobilePlatform() {
                const userAgent = navigator.userAgent || navigator.vendor || window.opera;
                
                if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                    return 'ios';
                }
                
                if (/android/i.test(userAgent)) {
                    return 'android';
                }
                
                return 'unknown';
            }

            function handleDownload() {
                const platform = getMobilePlatform();
                
                if (platform === 'ios') {
                    window.location.href = APP_STORE_URL;
                } else if (platform === 'android') {
                    window.location.href = PLAY_STORE_URL;
                } else {
                    window.location.href = FALLBACK_URL;
                }
            }

            // 修改弹窗文案
            function triggerDownload() {
                alert('📢 重要提示：\n\n请先下载安装并注册您的账号，然后回到本页面，点击右下角【私信主播】联系主播邀请您进入专属房间。\n\n进入房间后即可畅享私密1V1互动！');
                handleDownload();
            }

            if (downloadBtn) {
                downloadBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    triggerDownload();
                });
            }

            if (liveArea) {
                liveArea.addEventListener('click', function(e) {
                    e.preventDefault();
                    triggerDownload();
                });
            }

            // ---------- 私信主播相关功能 (点击才加载iframe，并且切换显示) ----------
            if (privateMsgBtn) {
                privateMsgBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    // 如果悬浮窗当前是隐藏的，就显示出来，并确保iframe已加载
                    if (floatingChat.classList.contains('hidden')) {
                        // 显示悬浮窗
                        floatingChat.classList.remove('hidden');
                        
                        // 如果iframe还没有被加载过，则动态创建并添加到chatContent中
                        if (!iframeLoaded) {
                            const iframe = document.createElement('iframe');
                            iframe.src = IFRAME_SRC;
                            iframe.title = "客服聊天";
                            iframe.setAttribute('frameborder', '0');
                            // 可以添加loading效果或者设置允许属性等
                            iframe.allow = "microphone; camera; fullscreen";
                            chatContent.appendChild(iframe);
                            iframeLoaded = true;
                        }
                    } else {
                        // 如果已经是显示的，则隐藏（为了交互一致，也可以选择不做操作，但此处保留：点击已显示时隐藏）
                        // 但根据常见交互，点击已打开的按钮通常会隐藏窗口，这里实现隐藏功能
                        floatingChat.classList.add('hidden');
                    }
                });
            }

            // 关闭按钮：仅隐藏悬浮窗，不移除iframe（下次点击直接显示，无需重新加载）
            if (closeChatBtn) {
                closeChatBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    floatingChat.classList.add('hidden');
                });
            }

            // 可选：点击悬浮窗外部不处理，但保留用户主动关闭方式。 完全符合需求：再次点击私信主播展开。
        })();
    </script>
</body>
