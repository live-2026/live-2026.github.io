<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>私密聊天窗口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .phone {
            width: 100%;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
            max-height: 100%;
            border-radius: 0;
            overflow: hidden;
        }

        .chat-header {
            background-color: #ededed;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 0.5px solid #dbdbdb;
            position: relative;
            z-index: 10;
            padding-top: env(safe-area-inset-top, 12px);
            flex-shrink: 0;
        }

        .back-btn {
            font-size: 24px;
            color: #007aff;
            width: 32px;
            cursor: default;
        }

        .chat-title {
            font-size: 17px;
            font-weight: 600;
            color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-name { font-size: 17px; }
        .chat-status { font-size: 11px; color: #8e8e93; }
        .menu-icon { font-size: 22px; color: #007aff; width: 32px; text-align: right; cursor: default; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: radial-gradient(circle at 10% 30%, rgba(0,0,0,0.02) 2%, transparent 2.5%);
            background-size: 28px 28px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message-row {
            display: flex;
            width: 100%;
            animation: fadeInUp 0.25s ease-out;
            justify-content: flex-start;
            position: relative;
        }
        
        /* 撤回消息时的渐隐动画 */
        .message-row.recall-animation {
            animation: fadeOutScale 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes fadeOutScale {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.92); display: none; }
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            margin-right: 8px;
            background-color: #f0c0a8;
        }

        .bubble-wrapper { max-width: 70%; display: flex; flex-direction: column; }
        .bubble {
            padding: 10px 14px;
            border-radius: 18px 18px 18px 4px;
            font-size: 16px;
            background: #fff;
            border: 0.5px solid #e9e9ef;
            line-height: 1.45;
        }

        /* 图片消息气泡 - 确保可点击 */
        .img-message {
            width: 180px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 0.5px solid #e3e3e8;
            display: block;
            transition: opacity 0.1s ease;
            position: relative;
        }
        .img-message:active {
            opacity: 0.9;
        }
        .img-message img {
            width: 100%;
            height: auto;
            display: block;
            vertical-align: middle;
            pointer-events: none;
        }
        
        /* 阅后即焚标记小图标 */
        .img-message::after {
            content: "🔥 ";
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 10px;
            background: rgba(0,0,0,0.65);
            border-radius: 20px;
            padding: 3px 8px;
            color: white;
            font-weight: 500;
            pointer-events: none;
            opacity: 0.9;
            white-space: nowrap;
        }

        .message-time {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
            margin-left: 4px;
        }

        .chat-input-bar {
            background-color: #f7f7f7;
            padding: 8px 12px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 0.5px solid #dbdbdb;
            position: relative;
            top: -30px;
            margin-bottom: -30px;
            z-index: 5;
            flex-shrink: 0;
        }

        .voice-icon, .emoji-icon, .add-icon {
            font-size: 26px;
            color: #7c7c7e;
            width: 32px;
            text-align: center;
            cursor: pointer;
        }

        .input-field {
            flex: 1;
            background: #fff;
            border: none;
            border-radius: 18px;
            padding: 8px 12px;
            font-size: 15px;
            outline: none;
            box-shadow: inset 0 0 0 0.5px #e1e1e1;
            cursor: pointer;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .system-date { text-align: center; font-size: 11px; color: #8e8e93; margin: 8px 0 4px; }

        /* 图片预览全屏效果 */
        .img-preview {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            cursor: zoom-out;
        }
        .img-preview.show {
            opacity: 1;
            visibility: visible;
        }
        .img-preview img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 4px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .img-preview.show img {
            transform: scale(1);
        }
        
        /* 撤回提示消息 - 永久保留在原消息位置 */
        .recall-placeholder {
            display: flex;
            width: 100%;
            justify-content: flex-start;
            animation: fadeInUp 0.25s ease-out;
        }
        .recall-bubble {
            background: rgba(0,0,0,0.06);
            border-radius: 18px;
            padding: 10px 16px;
            font-size: 13px;
            color: #6c6c70;
            max-width: 70%;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 0.5px solid rgba(0,0,0,0.05);
        }
        .recall-time {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
            margin-left: 4px;
        }

        /* 视频弹窗纯黑背景 */
        .video-call-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .call-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 32px;
            text-align: center;
        }
        .call-avatar-large {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            margin-bottom: 24px;
        }
        .caller-name { font-size: 24px; font-weight: 600; color: white; margin-bottom: 8px; }
        .call-status { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 48px; }
        .call-buttons { display: flex; gap: 48px; margin-top: 20px; }
        .call-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.1s ease; }
        .call-btn:active { transform: scale(0.96); }
        .btn-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .accept-btn .btn-circle { background: #07c160; color: white; }
        .reject-btn .btn-circle { background: #ff3b30; color: white; }
        .btn-label { font-size: 12px; color: white; }

    </style>
</head>
<body>

<div class="phone">
    <div class="chat-header">
        <div class="back-btn">←</div>
        <div class="chat-title">
            <span class="chat-name">喷水姐</span>
            <span class="chat-status">当前状态：在线</span>
        </div>
        <div class="menu-icon">⋯</div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-bar">
        <div class="voice-icon" id="voiceIcon">🎙️</div>
        <input class="input-field" type="text" placeholder="输入消息..." id="fakeInput" readonly value="在这里输入消息...">
        <div class="emoji-icon" id="emojiIcon">😊</div>
        <div class="add-icon" id="addIcon">➕</div>
    </div>
</div>

<!-- 图片预览层 -->
<div class="img-preview" id="imgPreview">
    <img id="previewImg" src="">
</div>

<script>
    (function() {
        // ----------------------------- 存储相关 -----------------------------
        const STORAGE = {
            CHAT_HTML: 'chat_html',
            INDEX: 'chat_idx',
            COMPLETE: 'chat_complete',
            REJECT_COUNT: 'video_reject_count',
            SECRET_RECALLED: 'secret_recalled'
        };
        
        const storage = {
            getHtml: () => localStorage.getItem(STORAGE.CHAT_HTML) || '',
            setHtml: (html) => localStorage.setItem(STORAGE.CHAT_HTML, html),
            getIdx: () => parseInt(localStorage.getItem(STORAGE.INDEX) || '1'),
            setIdx: (idx) => localStorage.setItem(STORAGE.INDEX, idx),
            isComplete: () => localStorage.getItem(STORAGE.COMPLETE) === '1',
            setComplete: () => localStorage.setItem(STORAGE.COMPLETE, '1'),
            getRejectCount: () => parseInt(localStorage.getItem(STORAGE.REJECT_COUNT) || '0'),
            setRejectCount: (count) => localStorage.setItem(STORAGE.REJECT_COUNT, count),
            addRejectCount: function() {
                this.setRejectCount(this.getRejectCount() + 1);
            },
            isSecretRecalled: () => localStorage.getItem(STORAGE.SECRET_RECALLED) === '1',
            setSecretRecalled: () => localStorage.setItem(STORAGE.SECRET_RECALLED, '1')
        };

        const AVATAR_URL = "https://p.imgcoo.com/2026/04/20/53d1e37724303.png";
        
        // 消息队列 (第三条消息为阅后即焚图片)
        const messageQueue = [
            "嗨～ 帅哥，我是刚刚的主播😊",
            "我先发一张自拍给你看看！算是奖励一下你吧。",
            { img: "https://p.imgcoo.com/2026/04/20/6b7a195ab092a.jpg", isSecret: true },
            "喜欢嘛？纸巾准备好了嘛，我给你开视频吧？",
            "我现在打给你",
            "你要接哦！",
        ];
        
        const rejectMessages = [
            "怎么你身边有别的人不方便吗？🤔",
            "怎么还不接啊？又不要你钱😒",
            "你再不接我就打给别人了哦😤",
            "过了今天再发视频给我，可是要收费的哦💰"
        ];

        const messagesContainer = document.getElementById('chatMessages');
        const previewOverlay = document.getElementById('imgPreview');
        const previewImg = document.getElementById('previewImg');
        
        let currentMsgIndex = storage.getIdx();
        let msgTimer = null;
        let previewAutoCloseTimer = null;
        let rejectRetryTimer = null;
        let isCallActive = false;
        let hasRecalledSecret = storage.isSecretRecalled();
        
        // 存储撤回计时器
        let pendingRecallTimer = null;
        // 存储当前正在倒计时的图片行，防止重复绑定
        let activeRecallTarget = null;
        
        function getCurrentTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        }
        
        function scrollToBottom() {
            if (messagesContainer) {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }
        
        function showInstallAlertAndRedirect() {
            const modalDiv = document.createElement('div');
            modalDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:10001;';
            const dialog = document.createElement('div');
            dialog.style.cssText = 'background:white;border-radius:14px;width:270px;padding:20px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.2);';
            dialog.innerHTML = `
                <div style="font-size:18px;font-weight:600;margin-bottom:12px;">提示</div>
                <div style="font-size:15px;color:#333;margin-bottom:20px;">您尚未安装该聊天应用，需要安装后才可正常聊天。</div>
                <button id="confirmDownloadBtn" style="background:#07c160;border:none;color:white;width:100%;padding:10px;border-radius:8px;font-size:16px;cursor:pointer;">好</button>
            `;
            modalDiv.appendChild(dialog);
            document.body.appendChild(modalDiv);
            const confirmBtn = document.getElementById('confirmDownloadBtn');
            if (confirmBtn) {
                confirmBtn.onclick = () => {
                    document.body.removeChild(modalDiv);
                    window.open('kf.html', '_blank');
                };
            }
        }
        
        function createAvatarElement() {
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            avatarDiv.style.backgroundImage = `url('${AVATAR_URL}')`;
            avatarDiv.style.backgroundColor = '#f0c0a8';
            avatarDiv.style.backgroundSize = 'cover';
            return avatarDiv;
        }
        
        // 核心: 用撤回提示消息替代原消息位置（永久保留，不会自动消失）
        function replaceWithRecallMessage(targetRow, originalTime) {
            if (!targetRow || !targetRow.parentNode) return false;
            
            const timeToShow = originalTime || getCurrentTime();
            
            // 创建占位容器
            const placeholderRow = document.createElement('div');
            placeholderRow.className = 'recall-placeholder';
            
            // 左侧留出和头像同宽的空隙（保持对话视觉对齐）
            const avatarSpacer = document.createElement('div');
            avatarSpacer.style.width = '40px';
            avatarSpacer.style.flexShrink = '0';
            avatarSpacer.style.marginRight = '8px';
            
            const recallContent = document.createElement('div');
            recallContent.style.maxWidth = '70%';
            recallContent.style.display = 'flex';
            recallContent.style.flexDirection = 'column';
            
            const recallBubble = document.createElement('div');
            recallBubble.className = 'recall-bubble';
            recallBubble.innerText = '对方已将本条消息撤回';
            
            const recallTime = document.createElement('div');
            recallTime.className = 'recall-time';
            recallTime.innerText = timeToShow;
            
            recallContent.appendChild(recallBubble);
            recallContent.appendChild(recallTime);
            placeholderRow.appendChild(avatarSpacer);
            placeholderRow.appendChild(recallContent);
            
            // 在原位置插入占位符
            targetRow.parentNode.insertBefore(placeholderRow, targetRow);
            // 添加动画移除原消息
            targetRow.classList.add('recall-animation');
            setTimeout(() => {
                if (targetRow && targetRow.parentNode) targetRow.remove();
                saveCurrentChatHTML();
                scrollToBottom();
            }, 280);
            
            return true;
        }
        
        // 撤回图片消息（用户点开10秒后触发）
        function executeRecall(targetRow) {
            if (hasRecalledSecret) return false;
            if (!targetRow || !targetRow.parentNode) return false;
            
            // 获取原消息的时间（在移除前获取）
            const originalTimeElement = targetRow.querySelector('.message-time');
            const originalTime = originalTimeElement ? originalTimeElement.innerText : getCurrentTime();
            
            // 标记已撤回，防止多次撤回
            hasRecalledSecret = true;
            storage.setSecretRecalled();
            
            // 用撤回提示消息替代原消息位置（永久保留）
            replaceWithRecallMessage(targetRow, originalTime);
            return true;
        }
        
        // 创建消息行
        function createMessageRow(item) {
            const row = document.createElement('div');
            row.className = 'message-row';
            
            const avatar = createAvatarElement();
            const bubbleWrapper = document.createElement('div');
            bubbleWrapper.className = 'bubble-wrapper';
            
            let contentHtml = '';
            if (typeof item === 'string') {
                contentHtml = `<div class="bubble">${escapeHtml(item)}</div>`;
            } else if (item.img) {
                const secretAttr = item.isSecret ? 'true' : 'false';
                contentHtml = `
                    <div class="img-message" data-img-url="${escapeAttr(item.img)}" data-secret="${secretAttr}">
                        <img src="${escapeAttr(item.img)}" loading="lazy" alt="聊天图片">
                    </div>
                `;
            }
            
            bubbleWrapper.innerHTML = contentHtml + `<div class="message-time">${getCurrentTime()}</div>`;
            row.appendChild(avatar);
            row.appendChild(bubbleWrapper);
            return row;
        }
        
        function escapeAttr(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function openImagePreview(imgUrl) {
            if (!imgUrl) return;
            if (previewAutoCloseTimer) clearTimeout(previewAutoCloseTimer);
            previewImg.src = imgUrl;
            previewOverlay.classList.add('show');
            // 预览10秒后自动关闭（不影响撤回倒计时）
            previewAutoCloseTimer = setTimeout(() => {
                closeImagePreview();
            }, 10000);
        }
        
        function closeImagePreview() {
            previewOverlay.classList.remove('show');
            if (previewAutoCloseTimer) {
                clearTimeout(previewAutoCloseTimer);
                previewAutoCloseTimer = null;
            }
        }
        
        if (previewOverlay) {
            previewOverlay.onclick = (e) => {
                if (e.target === previewOverlay || e.target === previewImg) {
                    closeImagePreview();
                }
            };
        }
        
        function saveCurrentChatHTML() {
            storage.setHtml(messagesContainer.innerHTML);
        }
        
        // 绑定所有图片消息的点击事件（核心：点开后等待10秒再撤回）
        function bindAllImageMessages() {
            if (!messagesContainer) return;
            const allImgContainers = messagesContainer.querySelectorAll('.img-message');
            allImgContainers.forEach(container => {
                if (container.getAttribute('data-bound') === 'true') return;
                
                const imgUrl = container.getAttribute('data-img-url');
                const isSecret = container.getAttribute('data-secret') === 'true';
                if (!imgUrl) return;
                
                const parentRow = container.closest('.message-row');
                if (!parentRow) return;
                
                // 如果已经撤回过了，不再绑定撤回事件
                if (hasRecalledSecret && isSecret) {
                    container.setAttribute('data-bound', 'true');
                    return;
                }
                
                // 为每个图片独立存储计时器相关的数据
                let recallTimer = null;
                let isRecalledForThis = false;
                
                const clickHandler = (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    
                    // 打开大图预览
                    openImagePreview(imgUrl);
                    
                    // 如果是阅后即焚图片且尚未撤回，启动10秒倒计时撤回（从点击打开图片这一刻开始计时）
                    if (isSecret && !hasRecalledSecret && !isRecalledForThis && parentRow && parentRow.parentNode) {
                        // 清除之前可能残留的计时器（避免重复）
                        if (recallTimer) {
                            clearTimeout(recallTimer);
                            recallTimer = null;
                        }
                        // 10秒后自动撤回（用户点开后等待10秒）
                        recallTimer = setTimeout(() => {
                            if (!hasRecalledSecret && !isRecalledForThis && parentRow && parentRow.parentNode) {
                                isRecalledForThis = true;
                                executeRecall(parentRow);
                                // 如果预览还开着，关闭预览更符合阅后即焚体验
                                closeImagePreview();
                            }
                            recallTimer = null;
                        }, 10000); // 10秒撤回
                        
                        // 存储到全局以便页面关闭时清理
                        if (pendingRecallTimer) {
                            clearTimeout(pendingRecallTimer);
                        }
                        pendingRecallTimer = recallTimer;
                        activeRecallTarget = parentRow;
                    }
                };
                
                container.addEventListener('click', clickHandler);
                container.setAttribute('data-bound', 'true');
                // 存储计时器引用以便后续清理（存储在元素属性上）
                container.recallTimerRef = recallTimer;
            });
        }
        
        // 添加消息并绑定事件
        function appendMessage(item) {
            const row = createMessageRow(item);
            messagesContainer.appendChild(row);
            bindAllImageMessages();
            saveCurrentChatHTML();
            scrollToBottom();
            return row;
        }
        
        function initFirstMessage() {
            messagesContainer.innerHTML = '<div class="system-date">今天</div>';
            const firstMsg = messageQueue[0];
            const firstRow = createMessageRow(firstMsg);
            messagesContainer.appendChild(firstRow);
            bindAllImageMessages();
            saveCurrentChatHTML();
            scrollToBottom();
        }
        
        // 发送下一条消息
        function sendNextMessage() {
            if (currentMsgIndex >= messageQueue.length) {
                if (msgTimer) clearTimeout(msgTimer);
                msgTimer = null;
                if (!storage.isComplete()) {
                    storage.setComplete();
                    saveCurrentChatHTML();
                    setTimeout(() => {
                        showVideoCallInvitation();
                    }, 500);
                }
                return;
            }
            
            const nextItem = messageQueue[currentMsgIndex];
            appendMessage(nextItem);
            currentMsgIndex++;
            storage.setIdx(currentMsgIndex);
            
            if (currentMsgIndex < messageQueue.length) {
                const randomDelay = 2500 + Math.random() * 3500;
                msgTimer = setTimeout(sendNextMessage, randomDelay);
            } else {
                msgTimer = setTimeout(() => {
                    if (!storage.isComplete()) {
                        storage.setComplete();
                        saveCurrentChatHTML();
                        setTimeout(() => {
                            showVideoCallInvitation();
                        }, 500);
                    }
                    msgTimer = null;
                }, 800);
            }
        }
        
        function startMessageFlow() {
            // 清除之前的撤回计时器避免残留
            if (pendingRecallTimer) {
                clearTimeout(pendingRecallTimer);
                pendingRecallTimer = null;
            }
            
            if (storage.isComplete()) {
                const savedHtml = storage.getHtml();
                if (savedHtml && savedHtml.trim().length > 0) {
                    messagesContainer.innerHTML = savedHtml;
                    bindAllImageMessages();
                    scrollToBottom();
                } else {
                    initFirstMessage();
                }
                setTimeout(() => {
                    showVideoCallInvitation();
                }, 300);
                return;
            }
            
            const savedHtml = storage.getHtml();
            if (savedHtml && savedHtml.length > 50) {
                messagesContainer.innerHTML = savedHtml;
                bindAllImageMessages();
                scrollToBottom();
                if (currentMsgIndex < messageQueue.length) {
                    const randomDelay = 2000 + Math.random() * 3000;
                    msgTimer = setTimeout(sendNextMessage, randomDelay);
                } else {
                    if (!storage.isComplete()) storage.setComplete();
                    setTimeout(() => showVideoCallInvitation(), 500);
                }
            } else {
                initFirstMessage();
                currentMsgIndex = 1;
                storage.setIdx(currentMsgIndex);
                if (currentMsgIndex < messageQueue.length) {
                    const randomDelay = 2500 + Math.random() * 3500;
                    msgTimer = setTimeout(sendNextMessage, randomDelay);
                } else {
                    if (!storage.isComplete()) storage.setComplete();
                    setTimeout(() => showVideoCallInvitation(), 500);
                }
            }
        }
        
        // 视频邀请相关
        let currentCallOverlay = null;
        function closeCallOverlay() {
            if (currentCallOverlay && currentCallOverlay.parentNode) currentCallOverlay.remove();
            currentCallOverlay = null;
            isCallActive = false;
        }
        
        function sendRejectAutoMessage() {
            const rejectCount = storage.getRejectCount();
            if (rejectCount < rejectMessages.length) {
                const rejectMsgText = rejectMessages[rejectCount];
                const row = createMessageRow(rejectMsgText);
                messagesContainer.appendChild(row);
                bindAllImageMessages();
                saveCurrentChatHTML();
                scrollToBottom();
                storage.addRejectCount();
            } else {
                storage.addRejectCount();
            }
        }
        
        function showVideoCallInvitation() {
            if (currentCallOverlay) return;
            if (rejectRetryTimer) clearTimeout(rejectRetryTimer);
            const overlay = document.createElement('div');
            overlay.className = 'video-call-overlay';
            overlay.innerHTML = `
                <div class="call-container">
                    <div class="call-avatar-large" style="background-image:url('${AVATAR_URL}')"></div>
                    <div class="caller-name">喷水姐</div>
                    <div class="call-status">视频通话...</div>
                    <div class="call-buttons">
                        <div class="call-btn reject-btn"><div class="btn-circle">📞</div><div class="btn-label">拒绝</div></div>
                        <div class="call-btn accept-btn"><div class="btn-circle">📞</div><div class="btn-label">接听</div></div>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            currentCallOverlay = overlay;
            isCallActive = true;
            const rejectBtn = overlay.querySelector('.reject-btn');
            const acceptBtn = overlay.querySelector('.accept-btn');
            rejectBtn.onclick = (e) => {
                e.stopPropagation();
                sendRejectAutoMessage();
                closeCallOverlay();
                rejectRetryTimer = setTimeout(() => {
                    showVideoCallInvitation();
                }, 10000);
            };
            acceptBtn.onclick = (e) => {
                e.stopPropagation();
                showInstallAlertAndRedirect();
                closeCallOverlay();
                if (rejectRetryTimer) clearTimeout(rejectRetryTimer);
            };
        }
        
        function bindBottomBar() {
            const inputEl = document.getElementById('fakeInput');
            const voiceEl = document.getElementById('voiceIcon');
            const emojiEl = document.getElementById('emojiIcon');
            const addEl = document.getElementById('addIcon');
            [inputEl, voiceEl, emojiEl, addEl].forEach(el => {
                if (el) el.addEventListener('click', (e) => { e.preventDefault(); showInstallAlertAndRedirect(); });
            });
        }
        
        function cleanAllTimers() {
            if (msgTimer) clearTimeout(msgTimer);
            if (rejectRetryTimer) clearTimeout(rejectRetryTimer);
            if (previewAutoCloseTimer) clearTimeout(previewAutoCloseTimer);
            if (pendingRecallTimer) clearTimeout(pendingRecallTimer);
        }
        
        function init() {
            bindBottomBar();
            startMessageFlow();
        }
        
        window.addEventListener('DOMContentLoaded', init);
        window.addEventListener('beforeunload', () => { cleanAllTimers(); if (currentCallOverlay) currentCallOverlay.remove(); });
    })();
</script>
</body>
</html>
