<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>格式整理 · 按钮置顶 · 自动保存</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #d0e0ed;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 8px;
            line-height: 1.3;
        }

        .phone-card {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 36px;
            box-shadow: 0 20px 30px -8px rgba(12, 40, 58, 0.3);
            padding: 20px 20px 24px;
            border: 1px solid rgba(90, 145, 190, 0.3);
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: auto;
            max-height: 95vh;
            overflow-y: auto;
        }

        .phone-card::-webkit-scrollbar {
            width: 4px;
        }
        .phone-card::-webkit-scrollbar-thumb {
            background: #b0c9de;
            border-radius: 20px;
        }

        .header-compact {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .header-compact h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #103744;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .header-compact h1 span {
            background: #b7d3e8;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 40px;
            color: #1b4b5e;
            margin-left: 8px;
        }

        .reset-touch {
            background: transparent;
            border: 1.5px dashed #397699;
            color: #1d4e6b;
            font-size: 1rem;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        .reset-touch:active {
            background: #c6ddef;
            border-style: solid;
        }

        .seq-control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #eaf1f8;
            border-radius: 60px;
            padding: 6px 8px;
            border: 1px solid #b9d2e7;
            width: 100%;
            gap: 8px;
        }

        .seq-btn {
            background: white;
            border: 1.5px solid #397699;
            color: #1d4e6b;
            font-size: 1.6rem;
            font-weight: 600;
            width: 52px;
            height: 52px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .seq-btn:active {
            background: #c6ddef;
            border-style: solid;
            transform: scale(0.95);
        }

        .seq-btn:disabled {
            opacity: 0.3;
            background: #e0e9f2;
            border-color: #9bb6cc;
            pointer-events: none;
        }

        .seq-display-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #d6e5f2;
            padding: 6px 18px;
            border-radius: 40px;
            flex: 1;
            justify-content: center;
        }

        .seq-label {
            font-size: 1rem;
            font-weight: 500;
            color: #2f5570;
            white-space: nowrap;
        }

        .seq-value {
            background: #215a78;
            color: white;
            font-weight: 700;
            font-size: 1.9rem;
            line-height: 1.2;
            padding: 2px 22px;
            border-radius: 50px;
            min-width: 80px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(20, 80, 110, 0.3);
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 4px 0 2px;
        }

        .id-label {
            font-weight: 600;
            color: #1d4a64;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .id-label small {
            font-weight: 400;
            font-size: 0.85rem;
            color: #467286;
        }

        .required-star {
            color: #cf3e3e;
            font-size: 1.3rem;
            margin-left: 2px;
        }

        .id-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #userIdInput {
            width: 100%;
            padding: 16px 22px;
            border: 2px solid #c1d9ec;
            border-radius: 50px;
            font-size: 1.1rem;
            background: white;
            outline: none;
            transition: 0.15s;
            -webkit-appearance: none;
            appearance: none;
        }

        #userIdInput:focus {
            border-color: #1f6f9c;
            box-shadow: 0 0 0 3px rgba(28, 110, 155, 0.2);
        }

        /* 合并后的复制按钮 - 放在结果上方 */
        .copy-btn {
            background: #1f6f9c;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.25rem;
            padding: 16px 22px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #0f527a;
            box-shadow: 0 4px 10px rgba(19, 93, 134, 0.4);
            letter-spacing: 0.5px;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 8px;
        }

        .copy-btn:active {
            background: #0e5780;
            transform: scale(0.98);
            box-shadow: 0 2px 6px #0e3d5c;
        }

        .output-wrapper {
            background: #f2f7fd;
            border-radius: 28px;
            padding: 6px 6px 10px 6px;
            border: 1px solid #b8d2ea;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 16px 0;
        }

        .output-header span {
            font-weight: 600;
            color: #1d5575;
            font-size: 1rem;
        }

        .output-content {
            background: #1a2f3c;
            color: #e6f3ff;
            border-radius: 24px;
            padding: 18px 20px;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 1.15rem;
            line-height: 1.9;
            white-space: pre-wrap;
            word-break: break-word;
            border: 2px solid #2b5d7c;
            margin: 10px 10px 8px 10px;
            box-shadow: inset 0 0 0 1px #427a9c;
        }

        .footer-note {
            display: flex;
            justify-content: space-between;
            color: #3f627c;
            font-size: 0.88rem;
            margin-top: 8px;
            padding: 0 4px;
        }

        .input-hint {
            color: #466473;
            font-size: 0.85rem;
            margin-left: 6px;
        }

        .copy-success-toast {
            background: #1e6b4c;
            color: white;
            text-align: center;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 6px 16px rgba(0,60,30,0.4);
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            animation: fadeInOut 1.6s ease forwards;
            white-space: nowrap;
            pointer-events: none;
        }

        .warning-toast {
            background: #b34141;
            color: white;
            text-align: center;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 6px 16px rgba(150, 40, 40, 0.5);
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            animation: fadeInOut 1.6s ease forwards;
            white-space: nowrap;
            pointer-events: none;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="phone-card">
        <div class="header-compact">
            <h1>
                📱 <span>Yoka</span>整理器
                
            </h1>
            <div class="reset-touch" id="resetSeqBtn">
                <span>↺</span> 重置
            </div>
        </div>

        <div class="seq-control-row">
            <button class="seq-btn" id="prevSeqBtn" aria-label="上一序号">−</button>
            
            <div class="seq-display-area">
                <span class="seq-label">序号</span>
                <span class="seq-value" id="seqDisplay">1</span>
            </div>
            
            <button class="seq-btn" id="nextSeqBtn" aria-label="下一序号">+</button>
        </div>

        <div class="input-section">
            <div class="id-label">
                🆔 用户ID <span class="required-star">*</span>
                <small>填写完核对无误后再点复制</small>
            </div>
            <div class="id-row">
                <input type="text" id="userIdInput" placeholder="例如 12346" value="" inputmode="numeric">
            </div>
            <div class="input-hint">🔔 输入ID后点击下方复制按钮可自动复制表格</div>
        </div>

        <!-- 合并后的复制按钮 - 放在整理结果上方 -->
        <button class="copy-btn" id="copyBtn">📋 复制结果并清空ID</button>

        <div class="output-wrapper">
            <div class="output-header">
                <span>📋 当前订单</span>
            </div>
            <div class="output-content" id="outputBox">
                序号：1<br>软件：Yoka<br>年龄: 成年<br>用户ID：______<br>地区 :台湾<br>聊天方式:tk
            </div>
        </div>

    </div>

    <div id="toastContainer" style="position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 9999;"></div>

    <script>
        (function() {
            const FIXED_SOFTWARE = 'Yoka';
            const FIXED_AGE = '成年';
            const FIXED_AREA = '台湾';
            const FIXED_CHAT = 'tk';

            const DEFAULT_STATE = {
                currentSeq: 1,
                userId: ''
            };

            function loadSavedState() {
                const saved = localStorage.getItem('formatterState');
                if (saved) {
                    try {
                        const state = JSON.parse(saved);
                        return {
                            currentSeq: state.currentSeq || 1,
                            userId: state.userId || ''
                        };
                    } catch (e) {
                        console.error('Failed to parse saved state', e);
                    }
                }
                return { ...DEFAULT_STATE };
            }

            function saveState() {
                const state = {
                    currentSeq: currentSeq,
                    userId: userIdInput.value
                };
                localStorage.setItem('formatterState', JSON.stringify(state));
            }

            const savedState = loadSavedState();
            let currentSeq = savedState.currentSeq;
            const MIN_SEQ = 1;
            const MAX_SEQ = 9999;

            const seqDisplay = document.getElementById('seqDisplay');
            const userIdInput = document.getElementById('userIdInput');
            const outputBox = document.getElementById('outputBox');
            const resetSeqBtn = document.getElementById('resetSeqBtn');
            const copyBtn = document.getElementById('copyBtn');
            const prevSeqBtn = document.getElementById('prevSeqBtn');
            const nextSeqBtn = document.getElementById('nextSeqBtn');
            const toastContainer = document.getElementById('toastContainer');

            function showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = type === 'success' ? 'copy-success-toast' : 'warning-toast';
                toast.textContent = message;
                toastContainer.appendChild(toast);

                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                }, 1600);
            }

            function updateSeqDisplay() {
                seqDisplay.textContent = currentSeq;
                prevSeqBtn.disabled = currentSeq <= MIN_SEQ;
                nextSeqBtn.disabled = currentSeq >= MAX_SEQ;
                saveState();
            }

            function generateOutputText(seq, userId) {
                const displayId = (userId && userId.trim() !== '') ? userId.trim() : '______';
                return `序号：${seq}\n软件：${FIXED_SOFTWARE}\n年龄: ${FIXED_AGE}\n用户ID：${displayId}\n地区 :${FIXED_AREA}\n聊天方式:${FIXED_CHAT}`;
            }

            function refreshOutput() {
                const userId = userIdInput.value;
                const outText = generateOutputText(currentSeq, userId);
                outputBox.innerText = outText;
                saveState();
            }

            function goToPrevSeq() {
                if (currentSeq > MIN_SEQ) {
                    currentSeq--;
                    updateSeqDisplay();
                    refreshOutput();
                }
            }

            function goToNextSeq() {
                if (currentSeq < MAX_SEQ) {
                    currentSeq++;
                    updateSeqDisplay();
                    refreshOutput();
                }
            }

            // 合并后的功能：复制 + 序号+1 + 清空ID
            async function handleCopyAndNext() {
                const rawId = userIdInput.value;
                const trimmedId = rawId.trim();

                // 如果ID为空，只显示警告，不执行任何操作
                if (trimmedId === '') {
                    showToast('⚠️ 请先填写用户ID', 'warning');
                    return;
                }

                // 先刷新输出（确保显示当前ID）
                refreshOutput();
                
                // 复制内容
                const textToCopy = outputBox.innerText;
                
                // 执行复制
                let copySuccess = false;
                
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    try {
                        await navigator.clipboard.writeText(textToCopy);
                        copySuccess = true;
                    } catch (err) {
                        console.log('Clipboard API 失败，尝试备用', err);
                    }
                }

                if (!copySuccess) {
                    try {
                        const textarea = document.createElement('textarea');
                        textarea.value = textToCopy;
                        textarea.style.position = 'fixed';
                        textarea.style.opacity = '0';
                        textarea.style.left = '-999px';
                        document.body.appendChild(textarea);
                        textarea.select();
                        textarea.setSelectionRange(0, textToCopy.length);
                        
                        copySuccess = document.execCommand('copy');
                        document.body.removeChild(textarea);
                    } catch (err) {
                        console.error('复制失败', err);
                    }
                }

                if (copySuccess) {
                    // 复制成功后，序号+1
                    if (currentSeq < MAX_SEQ) {
                        currentSeq++;
                    }
                    updateSeqDisplay();
                    
                    // 清空ID输入框
                    userIdInput.value = '';
                    
                    // 刷新输出（会显示______）
                    refreshOutput();
                    
                    // 显示成功提示
                    showToast('✅ 已复制，序号+1，ID已清空', 'success');
                } else {
                    showToast('❌ 复制失败，请重试', 'warning');
                }
            }

            function resetSeq() {
                currentSeq = 1;
                userIdInput.value = '';
                
                updateSeqDisplay();
                refreshOutput();
                saveState();
                
                showToast('已重置，序号1 ID清空', 'success');
            }

            function init() {
                userIdInput.value = savedState.userId;
                updateSeqDisplay();
                refreshOutput();
            }

            // 事件绑定
            copyBtn.addEventListener('click', function(e) {
                e.preventDefault();
                handleCopyAndNext();
            });

            resetSeqBtn.addEventListener('click', function(e) {
                e.preventDefault();
                resetSeq();
            });

            prevSeqBtn.addEventListener('click', function(e) {
                e.preventDefault();
                goToPrevSeq();
            });

            nextSeqBtn.addEventListener('click', function(e) {
                e.preventDefault();
                goToNextSeq();
            });

            userIdInput.addEventListener('input', function() {
                refreshOutput();
            });

            userIdInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleCopyAndNext();
                }
            });

            init();
        })();
    </script>
</body>
</html>
